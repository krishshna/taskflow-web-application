<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow — Stay in Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain-overlay"></div>

  <!-- ===================== AUTH SCREEN ===================== -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">
          <span></span><span></span><span></span>
        </div>
        <span class="logo-text">Taskflow</span>
      </div>

      <div class="auth-hero">
        <h1>Stay in<br><em>Motion.</em></h1>
        <p>Your tasks. Your pace. Sign in to get started.</p>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login form -->
      <div class="auth-form" id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"/>
        </div>
        <button class="auth-btn primary" id="loginBtn">Sign In</button>
        <div class="auth-divider"><span>or</span></div>
        <button class="auth-btn google" id="googleLoginBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>

      <!-- Signup form -->
      <div class="auth-form hidden" id="signupForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Repeat password" autocomplete="new-password"/>
        </div>
        <button class="auth-btn primary" id="signupBtn">Create Account</button>
        <div class="auth-divider"><span>or</span></div>
        <button class="auth-btn google" id="googleSignupBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>

      <p class="auth-error" id="authError"></p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div class="app-screen hidden" id="appScreen">

    <div class="grain-overlay"></div>

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-mark">
          <span></span><span></span><span></span>
        </div>
        <span class="logo-text">Taskflow</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <div class="user-menu" id="userMenu">
          <div class="user-avatar" id="userAvatar">K</div>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-email" id="userEmail"></div>
            <button class="clear-all-btn" id="clearAllBtn">Clear Done</button>
            <button class="signout-btn" id="signOutBtn">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="main-content">

      <section class="hero">
        <div class="hero-text">
          <h1 class="hero-title">Stay in<br><em>Motion.</em></h1>
          <p class="hero-sub">Capture tasks. Get them done. Move forward.</p>
        </div>

        <div class="input-card">
          <div class="input-row">
            <div class="input-wrapper">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" maxlength="120"/>
            </div>
            <div class="input-meta">
              <select id="taskPriority">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
              <select id="taskCategory">
                <option value="personal">👤 Personal</option>
                <option value="work">💼 Work</option>
                <option value="health">❤️ Health</option>
                <option value="learning">📚 Learning</option>
                <option value="other">📌 Other</option>
              </select>
              <input type="date" id="taskDue" title="Due date (optional)"/>
            </div>
            <button class="add-btn" id="addBtn">
              <span>Add Task</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>

          <div class="stats-bar">
            <div class="stat">
              <span class="stat-num" id="statTotal">0</span>
              <span class="stat-label">Total</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <span class="stat-num" id="statPending">0</span>
              <span class="stat-label">Pending</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <span class="stat-num" id="statDone">0</span>
              <span class="stat-label">Done</span>
            </div>
            <div class="stat-divider"></div>
            <div class="progress-wrap">
              <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
              <span class="stat-label" id="progressPct">0%</span>
            </div>
          </div>
        </div>
      </section>

      <section class="controls-bar">
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search tasks…"/>
        </div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
          <button class="filter-btn" data-filter="high">🔴 High</button>
          <button class="filter-btn" data-filter="overdue">⚠️ Overdue</button>
        </div>
        <div class="sort-wrap">
          <label>Sort:</label>
          <select id="sortSelect">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="priority">Priority</option>
            <option value="due">Due Date</option>
            <option value="alpha">A–Z</option>
          </select>
        </div>
      </section>

      <section class="task-section">
        <div id="taskList" class="task-list"></div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✦</div>
          <p>No tasks here yet.</p>
          <span>Add one above to get started.</span>
        </div>
      </section>

    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Edit Task</h2>
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body">
          <label>Task</label>
          <input type="text" id="editInput" maxlength="120" placeholder="Task description"/>
          <div class="modal-row">
            <div>
              <label>Priority</label>
              <select id="editPriority">
                <option value="low">🟢 Low</option>
                <option value="medium">🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
            <div>
              <label>Category</label>
              <select id="editCategory">
                <option value="personal">👤 Personal</option>
                <option value="work">💼 Work</option>
                <option value="health">❤️ Health</option>
                <option value="learning">📚 Learning</option>
                <option value="other">📌 Other</option>
              </select>
            </div>
            <div>
              <label>Due Date</label>
              <input type="date" id="editDue"/>
            </div>
          </div>
          <label>Notes</label>
          <textarea id="editNotes" placeholder="Additional notes (optional)" rows="3"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="modalCancel">Cancel</button>
          <button class="btn-save" id="modalSave">Save Changes</button>
        </div>
      </div>
    </div>

  </div><!-- end app-screen -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
